[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

[rpc_endpoints]
celo = "https://forno.celo.org"
alfajores = "https://alfajores-forno.celo-testnet.org"
soneium = "https://rpc.soneium.org"

[etherscan]
celo = { key = "${ETHERSCAN_API_KEY}", chain = 42220 }
alfajores = { key = "${ETHERSCAN_API_KEY}", chain = 44787 }
# Soneium verifies via Blockscout (no API key required).
soneium = { key = "blockscout", url = "https://soneium.blockscout.com/api", chain = 1868 }
